<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Time Log">
<meta name="theme-color" content="#F0F5FF">
<title>Time Log</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: linear-gradient(180deg, #F0F5FF 0%, #FFF8F3 100%);
    color: #2D3748;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body {
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
    max-width: 500px;
    margin: 0 auto;
  }
  header { padding: 20px 4px 24px; }
  h1 {
    font-size: 32px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.5px;
  }
  .subtitle {
    color: #718096;
    font-size: 15px;
    margin-top: 4px;
  }
  .card {
    background: #FFFFFF;
    border-radius: 18px;
    box-shadow: 0 1px 3px rgba(91, 141, 239, 0.08);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .field {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 0.5px solid #E8EEF7;
    min-height: 56px;
  }
  .field:last-child { border-bottom: none; }
  .field label {
    flex: 0 0 90px;
    font-size: 15px;
    font-weight: 500;
    color: #2D3748;
  }

  .field input[type="date"],
  .field input[type="time"] {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 17px;
    font-family: inherit;
    color: #2D3748;
    text-align: right;
    padding: 8px 0;
    -webkit-appearance: none;
    appearance: none;
    min-height: 32px;
    cursor: pointer;
  }

  .project-trigger {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 17px;
    font-family: inherit;
    color: #2D3748;
    text-align: right;
    padding: 8px 0;
    cursor: pointer;
    min-height: 32px;
  }
  .project-trigger.placeholder { color: #B8C5D6; }
  .project-trigger::after {
    content: "›";
    margin-left: 8px;
    color: #B8C5D6;
    font-size: 20px;
    display: inline-block;
    transform: rotate(90deg);
  }

  .total-display {
    flex: 1;
    text-align: right;
    font-size: 17px;
    color: #E5734A;
    font-weight: 600;
  }
  .total-display.empty { color: #B8C5D6; font-weight: 400; }

  .submit-btn {
    width: 100%;
    background: linear-gradient(180deg, #FF8A5B 0%, #E5734A 100%);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: 0 2px 8px rgba(255, 138, 91, 0.25);
    transition: transform 0.1s ease;
  }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .test-btn {
    width: 100%;
    background: transparent;
    color: #5B8DEF;
    border: 1px solid #5B8DEF;
    padding: 12px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    margin-top: 10px;
  }

  .status {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(140px);
    background: #2D3748;
    color: white;
    padding: 14px 22px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    max-width: 90%;
    text-align: center;
  }
  .status.show { transform: translateX(-50%) translateY(0); }
  .status.success { background: #5B8DEF; }
  .status.error { background: #E5734A; }

  .recent-header {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #718096;
    padding: 24px 4px 8px;
  }
  .entry {
    padding: 12px 16px;
    border-bottom: 0.5px solid #E8EEF7;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .entry:last-child { border-bottom: none; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-project {
    font-weight: 500;
    font-size: 15px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .entry-meta {
    font-size: 13px;
    color: #718096;
    margin-top: 2px;
  }
  .entry-hours {
    font-weight: 600;
    color: #E5734A;
    font-size: 15px;
    margin-left: 12px;
  }
  .empty-state {
    text-align: center;
    color: #B8C5D6;
    font-size: 14px;
    padding: 20px;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(45, 55, 72, 0.5);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: white;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 500px;
    max-height: 75vh;
    overflow-y: auto;
    padding: 8px 0 calc(20px + env(safe-area-inset-bottom));
    animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 40px;
    height: 4px;
    background: #E8EEF7;
    border-radius: 2px;
    margin: 8px auto 16px;
  }
  .modal-title {
    font-size: 17px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 8px;
  }
  .modal-option {
    padding: 16px 24px;
    font-size: 17px;
    border-bottom: 0.5px solid #E8EEF7;
    cursor: pointer;
  }
  .modal-option:active { background: #F0F5FF; }
  .modal-option:last-of-type { border-bottom: none; }
  .modal-new {
    padding: 16px 24px;
    display: flex;
    gap: 8px;
    border-top: 8px solid #F0F5FF;
  }
  .modal-new input {
    flex: 1;
    border: 1px solid #E8EEF7;
    border-radius: 10px;
    padding: 12px;
    font-size: 16px;
    font-family: inherit;
    outline: none;
  }
  .modal-new input:focus { border-color: #5B8DEF; }
  .modal-new button {
    background: #5B8DEF;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0 16px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <h1>⏱ Time Log</h1>
  <div class="subtitle" id="todayLabel"></div>
</header>

<form id="logForm" autocomplete="off">

  <div class="card">
    <div class="field">
      <label for="date">Date</label>
      <input type="date" id="date" required>
    </div>

    <div class="field">
      <label>Project</label>
      <div class="project-trigger placeholder" id="projectTrigger">Tap to pick</div>
      <input type="hidden" id="projectInput" required>
    </div>

    <div class="field">
      <label for="startTime">Start</label>
      <input type="time" id="startTime" required>
    </div>

    <div class="field">
      <label for="endTime">End</label>
      <input type="time" id="endTime" required>
    </div>

    <div class="field">
      <label>Total</label>
      <div class="total-display empty" id="totalDisplay">—</div>
    </div>
  </div>

  <button type="submit" class="submit-btn" id="submitBtn">Save to Google Sheet</button>
  <button type="button" class="test-btn" id="testBtn">Test connection to Google Sheet</button>
</form>

<div class="recent-header">Recent on this device</div>
<div class="card" id="recentList">
  <div class="empty-state">No entries yet</div>
</div>

<div class="modal-backdrop" id="projectModal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">Pick a project</div>
    <div id="projectOptions"></div>
    <div class="modal-new">
      <input type="text" id="newProjectInput" placeholder="Or type a new one" autocomplete="off">
      <button type="button" id="addNewBtn">Add</button>
    </div>
  </div>
</div>

<div class="status" id="status"></div>

<script>
  // ============================================================
  // CONFIG
  // ============================================================
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzgJzMhBFgG363Zx9bQXTtvE7-6Z1aBQzIni2jM1Q2rA_y5HwkRpwygDyrxZjA17kf2/exec";

  const PRESET_PROJECTS = [
    "Client work",
    "Email",
    "Meetings",
    "Deep work",
    "Admin",
    "Personal project"
  ];
  // ============================================================

  const $ = id => document.getElementById(id);

  function getAllProjects() {
    const used = JSON.parse(localStorage.getItem("usedProjects") || "[]");
    return Array.from(new Set([...PRESET_PROJECTS, ...used]));
  }

  function openProjectModal() {
    const list = $("projectOptions");
    list.innerHTML = "";
    getAllProjects().forEach(p => {
      const div = document.createElement("div");
      div.className = "modal-option";
      div.textContent = p;
      div.addEventListener("click", () => selectProject(p));
      list.appendChild(div);
    });
    $("newProjectInput").value = "";
    $("projectModal").classList.add("show");
  }

  function closeProjectModal() {
    $("projectModal").classList.remove("show");
  }

  function selectProject(name) {
    const clean = name.trim();
    if (!clean) return;
    $("projectInput").value = clean;
    const trigger = $("projectTrigger");
    trigger.textContent = clean;
    trigger.classList.remove("placeholder");

    if (!PRESET_PROJECTS.includes(clean)) {
      const used = JSON.parse(localStorage.getItem("usedProjects") || "[]");
      if (!used.includes(clean)) {
        used.unshift(clean);
        localStorage.setItem("usedProjects", JSON.stringify(used.slice(0, 20)));
      }
    }
    closeProjectModal();
  }

  $("projectTrigger").addEventListener("click", openProjectModal);
  $("projectModal").addEventListener("click", closeProjectModal);
  $("addNewBtn").addEventListener("click", () => {
    const val = $("newProjectInput").value.trim();
    if (val) selectProject(val);
  });
  $("newProjectInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      const val = $("newProjectInput").value.trim();
      if (val) selectProject(val);
    }
  });

  function initDate() {
    const now = new Date();
    const pad = n => String(n).padStart(2, "0");
    const iso = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
    $("date").value = iso;
    $("todayLabel").textContent = now.toLocaleDateString("en-US", {
      weekday: "long", month: "long", day: "numeric"
    });
  }

  function calcTotal() {
    const s = $("startTime").value;
    const e = $("endTime").value;
    const display = $("totalDisplay");
    if (!s || !e) {
      display.textContent = "—";
      display.classList.add("empty");
      return null;
    }
    const [sh, sm] = s.split(":").map(Number);
    const [eh, em] = e.split(":").map(Number);
    let mins = (eh * 60 + em) - (sh * 60 + sm);
    if (mins < 0) mins += 24 * 60;
    const hrs = mins / 60;
    display.textContent = hrs.toFixed(2) + " hrs";
    display.classList.remove("empty");
    return hrs;
  }

  ["change", "input", "blur"].forEach(evt => {
    $("startTime").addEventListener(evt, calcTotal);
    $("endTime").addEventListener(evt, calcTotal);
  });

  function formatDateMDY(iso) {
    const [y, m, d] = iso.split("-");
    return `${m}/${d}/${y}`;
  }
  function formatTime12(hhmm) {
    const [h, m] = hhmm.split(":").map(Number);
    const period = h >= 12 ? "PM" : "AM";
    const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
    return `${h12}:${String(m).padStart(2, "0")} ${period}`;
  }

  let statusTimer;
  function showStatus(msg, type = "", duration = 2600) {
    const el = $("status");
    clearTimeout(statusTimer);
    el.textContent = msg;
    el.className = "status show " + type;
    statusTimer = setTimeout(() => { el.className = "status " + type; }, duration);
  }

  function saveLocal(entry) {
    const recent = JSON.parse(localStorage.getItem("recentEntries") || "[]");
    recent.unshift(entry);
    localStorage.setItem("recentEntries", JSON.stringify(recent.slice(0, 10)));
    renderRecent();
  }

  function renderRecent() {
    const recent = JSON.parse(localStorage.getItem("recentEntries") || "[]");
    const list = $("recentList");
    if (recent.length === 0) {
      list.innerHTML = '<div class="empty-state">No entries yet</div>';
      return;
    }
    list.innerHTML = recent.map(e => `
      <div class="entry">
        <div class="entry-info">
          <div class="entry-project">${escapeHtml(e.project)}</div>
          <div class="entry-meta">${e.date} · ${e.start} – ${e.end}</div>
        </div>
        <div class="entry-hours">${e.hours.toFixed(2)}h</div>
      </div>
    `).join("");
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  async function sendToSheet(payload) {
    const params = new URLSearchParams(payload);
    const url = `${SCRIPT_URL}?${params.toString()}`;
    const response = await fetch(url, { method: "GET", redirect: "follow" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const text = await response.text();
    try {
      const json = JSON.parse(text);
      if (json.status !== "ok") throw new Error(json.message || "Server error");
      return json;
    } catch (e) {
      if (e.message.includes("Server error")) throw e;
      throw new Error("Unexpected response");
    }
  }

  $("logForm").addEventListener("submit", async (ev) => {
    ev.preventDefault();

    const hours = calcTotal();
    if (hours === null) {
      showStatus("Fill in start and end time", "error");
      return;
    }
    const project = $("projectInput").value.trim();
    if (!project) {
      showStatus("Pick a project", "error");
      return;
    }

    const payload = {
      date: formatDateMDY($("date").value),
      project: project,
      start: formatTime12($("startTime").value),
      end: formatTime12($("endTime").value),
      hours: Number(hours.toFixed(2))
    };

    const btn = $("submitBtn");
    btn.disabled = true;
    btn.textContent = "Saving...";

    try {
      await sendToSheet(payload);
      saveLocal(payload);
      showStatus("Saved to Google Sheet ✓", "success");
      resetForm();
    } catch (err) {
      console.error(err);
      showStatus("Couldn't save: " + err.message, "error", 4000);
      saveLocal(payload);
    } finally {
      btn.disabled = false;
      btn.textContent = "Save to Google Sheet";
    }
  });

  $("testBtn").addEventListener("click", async () => {
    showStatus("Testing...", "");
    try {
      const response = await fetch(SCRIPT_URL, { method: "GET", redirect: "follow" });
      const text = await response.text();
      if (!response.ok) {
        showStatus(`Server responded with ${response.status}`, "error", 5000);
        return;
      }
      if (text.includes("Time Log endpoint")) {
        showStatus("Connected to Apps Script ✓", "success", 3000);
      } else {
        showStatus("Got response but unexpected: " + text.slice(0, 60), "error", 5000);
      }
    } catch (err) {
      showStatus("Cannot reach: " + err.message, "error", 5000);
    }
  });

  function resetForm() {
    $("projectInput").value = "";
    const trigger = $("projectTrigger");
    trigger.textContent = "Tap to pick";
    trigger.classList.add("placeholder");
    $("startTime").value = "";
    $("endTime").value = "";
    const td = $("totalDisplay");
    td.textContent = "—";
    td.classList.add("empty");
  }

  initDate();
  renderRecent();
</script>

</body>
</html>
